version: '3.8'

services:
  redis:
    image: redis:7-alpine
    container_name: equihire-redis
    ports:
      - "6379:6379"
    networks:
      - equihire-network

  ballerina-gateway:
    build: ./ballerina-gateway
    container_name: equihire-ballerina-gateway
    ports:
      - "9090:9090"
      - "9091:9091"
    environment:
      - REDIS_HOST=redis
    depends_on:
      - redis
    networks:
      - equihire-network
    volumes:
      - ./ballerina-gateway/Config.toml:/app/Config.toml

networks:
  equihire-network:
    driver: bridge
